# -- General settings  ----------------------------------------------------------
set -g mouse on                                 # add mouse support
set -g base-index 1                             # start windows numbering at 1
set -g pane-base-index 1                        # start pane numbering at 1
set -g renumber-windows on                      # renumber all windows when any window is closed
set -g status-position top                      # position statusbar on top
set -g status-left-length 100                   # allow for longer session names
set -g automatic-rename off                     # disable auto renaming of windows
set -g mode-keys vi                             # Set vi stytle keybindings in copy mode
set -g allow-rename off
# Fix Colors
set -g default-terminal "tmux-256color"         # set terminal colors
# set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # undercurl colors
set -g history-limit 50000                          # increase scrollback buffer
# Slightly dim the current focused pane
set-option -g focus-events on
set-hook -g pane-focus-in 'select-pane -P "bg=#1e2030,fg=default"'
set-hook -g pane-focus-out 'select-pane -P "bg=default,fg=default"'

# -- Key Maps -------------------------------------------------------------------
# Prefix: C-b -> C-Space
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# NOTE: All launcher popups/menus use a standard 85% size. tmux 3.6 does not
# expand #{} formats in display-popup -w/-h, so this value can't be a variable;
# to resize every popup, find-replace "85%" in this file.

# ── Core: config / windows / panes ────────────────────────────────────────────
# Reload config
unbind r
bind -N "* Reload tmux config" r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded tmux config.'

# New window (prompted name)
unbind t
unbind C-c
bind-key -N "* New window (prompted name)" t command-prompt -p "window name:" "new-window; rename-window '%%'"
bind-key -N "* New window (prompted name)" C-c command-prompt -p "window name:" "new-window; rename-window '%%'"

# Splits (inherit current path)
unbind x
unbind y
bind-key -N "* Split window vertically" x split-window -v -c "#{pane_current_path}"
bind-key -N "* Split window horizontally" y split-window -h -c "#{pane_current_path}"

# Resize panes
bind -N "* Resize pane down"  -r j resize-pane -D 3
bind -N "* Resize pane up"    -r k resize-pane -U 3
bind -N "* Resize pane right" -r l resize-pane -R 3
bind -N "* Resize pane left"  -r h resize-pane -L 3

# Zoom / rename pane
bind -N "* Toggle pane zoom" -r m resize-pane -Z
bind -N "* Rename current pane" R command-prompt "select-pane -T '%%'"

# Window navigation
unbind Pagedown
unbind Pageup
bind-key -N "* Next window"     Pagedown next-window
bind-key -N "* Previous window" Pageup   previous-window

# Copy mode / paste
bind -N "* Enter copy mode" Space copy-mode
bind -N "* Paste buffer" P paste-buffer
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Kill window / session (confirm)
unbind &
unbind q
unbind C-q
bind -N "* Kill window (confirm)"  C-w confirm-before -p "kill-window #W? (y/n)" kill-window
bind -N "* Kill session (confirm)" q   confirm-before -p "kill-session #S? (y/n)" kill-session
bind -N "* Kill session (confirm)" C-q confirm-before -p "kill-session #S? (y/n)" kill-session

# Scratch terminal (floating shell, current path; `exit` closes it)
bind -N "* Scratch terminal (popup)" Enter display-popup -w 85% -h 85% -d "#{pane_current_path}" -E

# ── Launcher menus (which-key style) ──────────────────────────────────────────
# prefix o = Open apps · g = Git · s = Session · . = Dotfiles · ? = Help

# Open: TUI apps
unbind o
bind -N "* Menu: open apps" o display-menu -T "#[align=centre] Open " -x C -y C \
  "lazysql"      s "display-popup -w 85% -h 85% -d \"#{pane_current_path}\" -E 'lazysql'" \
  "lazydocker"   d "display-popup -w 85% -h 85% -d \"#{pane_current_path}\" -E 'lazydocker'" \
  "yazi (files)" y "new-window -c \"#{pane_current_path}\" -n yazi 'yazi'" \
  "btop"         b "display-popup -w 85% -h 85% -E 'btop'" \
  "taproom"            t "display-popup -w 85% -h 85% -E 'taproom -f \"Expl. Installed\" --hide-columns Description'" \
  "taproom (outdated)" O "display-popup -w 85% -h 85% -E 'taproom -f Outdated'" \
  "" \
  "Exit"         q ""

# Git
unbind g
bind -N "* Menu: git" g display-menu -T "#[align=centre] Git " -x C -y C \
  "lazygit"         g "display-popup -w 85% -h 85% -d \"#{pane_current_path}\" -E 'lazygit'" \
  "gh dash (PRs)"   d "display-popup -w 85% -h 85% -E 'gh dash'" \
  "worktree picker" w "display-popup -w 85% -h 85% -E '~/.config/tmux/scripts/tmux-worktree-picker.sh'" \
  "" \
  "Exit"            q ""

# Session
unbind s
bind -N "* Menu: session" s display-menu -T "#[align=centre] Session " -x C -y C \
  "switch (fzf)" s "display-popup -w 85% -h 85% -E '~/.config/tmux/scripts/session-switch.sh'" \
  "tree"         t "choose-tree -Zs" \
  "last"         l "switch-client -l" \
  "rename"       r "command-prompt -p 'rename session:' { rename-session '%%' }" \
  "detach"       d "detach-client" \
  "kill (confirm)" k "confirm-before -p 'kill-session #S? (y/n)' kill-session" \
  "" \
  "Exit"         q ""

# Dotfiles (edit in popup)
unbind .
bind -N "* Menu: dotfiles" . display-menu -T "#[align=centre] Dotfiles " -x C -y C \
  "dotfiles"   d "display-popup -w 85% -h 85% -T 'Dotfiles'           -d ~/dotfiles/ -E 'nvim README.md -c \"Neotree show\"'" \
  "tmux"       t "display-popup -w 85% -h 85% -T 'Tmux config'        -E 'nvim ~/.config/tmux/tmux.conf'" \
  "zsh"        z "display-popup -w 85% -h 85% -T 'Zsh config'         -d ~/.config/zsh -E 'nvim .zshrc -c \"Neotree show\"'" \
  "nvim"       n "display-popup -w 85% -h 85% -T 'Neovim config'      -d ~/.config/nvim -E 'nvim'" \
  "ghostty"    g "display-popup -w 85% -h 85% -T 'Ghostty config'     -E 'nvim ~/.config/ghostty/config'" \
  "lazygit"    l "display-popup -w 85% -h 85% -T 'Lazygit config'     -E 'nvim ~/.config/lazygit/config.yml'" \
  "yabai"      y "display-popup -w 85% -h 85% -T 'Yabai config'       -E 'nvim ~/.yabairc'" \
  "skhd"       s "display-popup -w 85% -h 85% -T 'Skhd config'        -E 'nvim ~/.skhdrc'" \
  "sketchybar" b "display-popup -w 85% -h 85% -T 'Sketchybar config'  -d ~/.config/sketchybar -E 'nvim'" \
  "" \
  "Exit"       q ""

# Help: at-a-glance menu index (disabled labels) + cheatsheet launchers
unbind ?
bind -N "* Menu: help" ? display-menu -T "#[align=centre] Help " -x C -y C \
  "" \
  "-Menus  (press prefix + key)" "" "" \
  "-  o  →  Open apps" "" "" \
  "-  g  →  Git" "" "" \
  "-  s  →  Session" "" "" \
  "-  .  →  Dotfiles" "" "" \
  "" \
  "-Cheatsheets" "" "" \
  "tmux keys (fzf)"  k "display-popup -w 85% -h 85% -E '~/.config/tmux/scripts/keybinding-lookup.sh'" \
  "tmux keys (raw)"  K "display-popup -w 85% -h 85% -E 'tmux list-keys -N | less -R'" \
  "skhd lookup"      c "display-popup -w 50% -h 85% -E 'zsh -i -c skhd_fzf_cheatsheet'" \
  "aliases lookup"   a "display-popup -w 50% -h 85% -E 'zsh -i -c fzfalias'" \
  "" \
  "Exit"             q ""

# Ctrl+' (root) - quick keybinding lookup
bind-key -T root -N "* Keybinding lookup (fzf)" "C-'" display-popup -w 45% -h 50% -E \
  "~/.config/tmux/scripts/keybinding-lookup.sh"

# -- Panes ---------------------------------------------------------------------
set -g pane-border-format " [#{pane_index}:#{pane_current_command}] #T "
set -g pane-border-status top


# -- Plugins -------------------------------------------------------------------
# Keep plugins in ~/.tmux/plugins (not ~/.config/tmux) to avoid polluting dotfiles repo
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Auto-install TPM and plugins only if TPM is not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'sainnhe/tmux-fzf'
# set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# # Plugin configuration
# set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

# Configure tmux-fzf
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_OPTIONS="-p -w 65% -h 55% -m"

# Configure Catpuccin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
# leave this unset to let applications set the window title
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
# set -g @catppuccin_status_background "none"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator " "

# Make the status line pretty and add some modules
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_directory}"
set -g status-justify "absolute-centre"

# Add spacing below status bar
# set -g status 2
# set -g status-format[1] ''

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# -- Popups / menus (must come AFTER catppuccin, which sets these itself) -------
# Match the focused-pane background (#1e2030) so popups/menus stand out, with a
# subtle border. menu-selected-style is left to catppuccin for theme consistency.
set -g popup-style "bg=#1e2030,fg=#cad3f5"
set -g popup-border-style "fg=#5b6078,bg=#1e2030"
set -g menu-style "bg=#1e2030"
set -g menu-border-style "fg=#5b6078,bg=#1e2030"
