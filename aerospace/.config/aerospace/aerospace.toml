# =============================================================================
# Aerospace config — tuned to mirror the existing yabai + skhd setup
# =============================================================================
#
# Purpose
#   A drop-in starting point for migrating from yabai/skhd to Aerospace
#   (https://github.com/nikitabobko/AeroSpace). Mirrors the existing keybinds
#   from skhd/.skhdrc and rules from yabai/.yabairc as closely as Aerospace's
#   model allows.
#
# How to use
#   Once you're ready to actually try this, copy or rename this file to
#   `aerospace.toml` (or symlink ~/.config/aerospace/aerospace.toml at it) and
#   run `aerospace reload-config` (or quit & relaunch the app).
#
# Mental model differences vs yabai
#   - Workspaces are FIXED (1..N + optional named). No create/destroy at runtime
#     like yabai's `space --create` / `space --destroy`.
#   - There is no "above" window layer. Always-on-top is not supported (same
#     limitation that bit us with the Claude window in yabai on recent macOS).
#   - There is no sticky-across-spaces (issue #2 upstream).
#   - No mouse-modifier drag-to-move/resize (alt+drag).
#   - No focus-follows-mouse with autoraise; only mouse-follows-focus on
#     monitor change.
#   - Layouts: yabai BSP   ≈ Aerospace `tiles`
#              yabai stack ≈ Aerospace `accordion`
#   - Aerospace runs as a normal app — no scripting addition, no SIP gymnastics.
#
# Keybinding convention
#   yabai/skhd used `lalt` (left-alt only). Aerospace doesn't distinguish left
#   vs right alt, so `lalt` becomes plain `alt` everywhere below. If muscle
#   memory fires on right-alt now, it will Just Work in Aerospace.
# =============================================================================


# ----- Startup -------------------------------------------------------------
# Set this to true once you've fully cut over from yabai. Until then, leave
# false so Aerospace doesn't fight yabai at login.
start-at-login = false

after-login-command = []

# Reproduce the JankyBorders line from .yabairc. Borders is window-manager
# agnostic, so the same command works here.
after-startup-command = [
  'exec-and-forget borders active_color=0xffc499df inactive_color=0x00494d64 width=4.0',
  # Reload sketchybar so its WM-detection (items/init.lua) picks up Aerospace
  # and swaps the spaces module for the aerospace one.
  'exec-and-forget sketchybar --reload',
]

# Notify sketchybar when the focused workspace changes.
# Consumed by sketchybar/.config/sketchybar/items/aerospace.lua via the
# `aerospace_workspace_change` custom event. The FOCUSED_WORKSPACE env var is
# read in the lua handler as `env.FOCUSED_WORKSPACE`.
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]


# ----- Layout defaults -----------------------------------------------------
# Aerospace `tiles` ≈ yabai BSP. New windows split the focused container.
default-root-container-layout = 'tiles'

# 'auto' picks horizontal on wide monitors, vertical on tall ones — closest
# match to yabai's automatic split direction.
default-root-container-orientation = 'auto'

# Equivalent of yabai's `enable-normalization-*`. Keeps the tree tidy by
# collapsing single-child containers and alternating split orientations.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Padding for accordion (stack-like) layout. 0 disables.
accordion-padding = 0


# ----- Mouse / focus behavior ----------------------------------------------
# Closest equivalent to yabai's `mouse_follows_focus on`. When you focus a
# window on another monitor, the mouse jumps to that monitor's center.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# NOT SUPPORTED: yabai's `focus_follows_mouse autoraise`. Aerospace has no
# equivalent — it's a deliberate design choice from upstream.

# NOT SUPPORTED: yabai's `mouse_modifier = alt` + `mouse_action1/2 = move/resize`.
# Use keyboard resize/move bindings instead (alt-shift-h/j/k/l, alt-shift-=/-).

# Don't auto-unhide apps on cmd-h. Match macOS default.
automatically-unhide-macos-hidden-apps = false


# ----- Gaps ----------------------------------------------------------------
# yabai equivalents:
#   inner.* ≈ yabai `window_gap 6`
#   outer.top = 38 leaves room for sketchybar (matches `external_bar all:38:0`)
#   outer.bottom/left/right ≈ yabai's `*_padding 3`
[gaps]
inner.horizontal = 6
inner.vertical   = 6
outer.top        = 38   # space for sketchybar
outer.bottom     = 3
outer.left       = 3
outer.right      = 3


[key-mapping]
preset = 'qwerty'


# ===========================================================================
# Per-app rules — port of yabai's `rule --add ... manage=off` lines.
# Aerospace uses `[[on-window-detected]]` blocks. `app-id` (bundle ID) is the
# most reliable matcher; `app-name-regex-substring` is a fallback for apps
# whose bundle ID you don't know.
#
# Find a running app's bundle ID:
#   osascript -e 'id of app "Claude"'
# ===========================================================================

# Generic floating-subrole rule (yabai: `subrole = AXFloatingWindow|...`):
# Aerospace floats AXSystemDialog/sheet windows automatically, so no manual
# rule is needed for that case.

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'   # Messages
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.weather'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'   # System Settings
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'fyi.lunar.Lunar'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'net.pornel.ImageOptim'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'net.freemacsoft.AppCleaner'
run = ['layout floating']

[[on-window-detected]]
if.app-name-regex-substring = 'Karabiner-Elements'
run = ['layout floating']

[[on-window-detected]]
if.app-name-regex-substring = 'Leader Key'
run = ['layout floating']

[[on-window-detected]]
if.app-name-regex-substring = 'Logi'   # Logi Options+ etc.
run = ['layout floating']

# Claude — float it. Always-on-top is NOT possible in Aerospace (same as the
# limitation we hit in yabai). If you want pinning, pair Aerospace with
# Hammerspoon/AfloatX for this one window.
[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = ['layout floating']

# CleanShot X — float its overlays.
[[on-window-detected]]
if.app-id = 'pl.maketheweb.cleanshotx'
run = ['layout floating']


# ===========================================================================
# Optional: pre-assign apps to workspaces so they always open in the right
# place. This is a workflow win that yabai doesn't really do — uncomment and
# tune to taste. Combine with the `run` array, e.g.:
#   run = ['move-node-to-workspace C', 'layout tiling']
#
# [[on-window-detected]]
# if.app-id = 'com.mitchellh.ghostty'
# run = ['move-node-to-workspace 1']
#
# [[on-window-detected]]
# if.app-id = 'com.vivaldi.Vivaldi'
# run = ['move-node-to-workspace 2']
#
# [[on-window-detected]]
# if.app-id = 'com.microsoft.VSCode'
# run = ['move-node-to-workspace 3']
# ===========================================================================


# ===========================================================================
# Main bindings — the equivalents of skhd's `lalt - <key>` set.
# ===========================================================================
[mode.main.binding]

# --- Layout toggles ---------------------------------------------------------
# skhd: `alt - t` toggled bsp ↔ stack. In Aerospace we get two more useful
# split commands instead.
alt-t      = 'layout tiles horizontal vertical'      # cycle tile orientation (replaces yabai's `--toggle split`)
alt-period = 'layout tiles horizontal vertical'      # extra alias from default config
alt-comma  = 'layout accordion horizontal vertical'  # accordion ≈ yabai stack


# --- Workspace focus (skhd `lalt - 1..6`) -----------------------------------
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
# Suggested expansion — Aerospace shines with more workspaces. Uncomment any
# you want to use; you can also use letters as workspace names:
# alt-7 = 'workspace 7'
# alt-8 = 'workspace 8'
# alt-9 = 'workspace 9'
# alt-w = 'workspace W'   # Web
# alt-c = 'workspace C'   # Code
# alt-m = 'workspace M'   # Messaging


# --- Move focused window to workspace (skhd `lalt + shift - 1..6`) ----------
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'


# --- Workspace cycling (skhd `lalt - tab` / `lalt + shift - tab`) -----------
# yabai cycled spaces on the current display. Aerospace's closest equivalent
# is `workspace-back-and-forth` (toggle to last) — different muscle memory but
# arguably more useful day-to-day.
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'


# --- Window focus (skhd `lalt - h/j/k/l`) -----------------------------------
# `--boundaries all-monitors-outer-frame` makes focus jump across monitors,
# matching yabai's `--focus west || display --focus west` chain.
alt-h = 'focus left  --boundaries all-monitors-outer-frame'
alt-j = 'focus down  --boundaries all-monitors-outer-frame'
alt-k = 'focus up    --boundaries all-monitors-outer-frame'
alt-l = 'focus right --boundaries all-monitors-outer-frame'

# skhd `lalt - n / lalt - p` cycled windows in current space (with stack
# fallback). Aerospace doesn't have a direct "next/prev within workspace", but
# `alt-h/j/k/l` covers it for tiles, and accordion has its own focus order.


# --- Move window inside layout (skhd `shift + lalt - h/j/k/l`) --------------
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'


# --- Resize (skhd `ctrl + lalt - h/j/k/l` and `lalt - up/down`) -------------
# Aerospace's `resize smart` picks an axis based on container orientation,
# which is closer to "grow/shrink" than per-edge resize.
alt-shift-equal = 'resize smart +50'   # grow  (≈ skhd `lalt - up`)
alt-shift-minus = 'resize smart -50'   # shrink (≈ skhd `lalt - down`)
# If you want the directional resizes from skhd, uncomment these. Note that
# Aerospace's resize is axis-based, so left/right both adjust the horizontal
# axis (and similarly j/k for vertical).
# ctrl-alt-h = 'resize width -50'
# ctrl-alt-l = 'resize width +50'
# ctrl-alt-j = 'resize height +50'
# ctrl-alt-k = 'resize height -50'


# --- Monitor focus (skhd `shift + lalt - n / p`) ----------------------------
alt-shift-n = 'focus-monitor --wrap-around next'
alt-shift-p = 'focus-monitor --wrap-around prev'


# --- Float / fullscreen ----------------------------------------------------
# yabai had `lalt - space` for toggle-float. Aerospace's equivalent is
# `layout floating tiling` which toggles the focused window.
alt-space = 'layout floating tiling'

# yabai `alt + shift - m` was set to fullscreen, but the SAME chord was later
# overridden in skhd to open Spotify (last definition wins). So in practice
# you didn't have a fullscreen hotkey. Adding one here as `alt-f`:
alt-f = 'fullscreen'


# --- Reload Aerospace (skhd `ctrl + lalt - r` for yabai restart) ------------
ctrl-alt-r = 'reload-config'


# ===========================================================================
# App launchers — direct port of skhd's bottom block.
# `exec-and-forget` runs in the background and doesn't block the keybind.
# ===========================================================================
alt-shift-enter = 'exec-and-forget open -a Ghostty'
alt-shift-b      = 'exec-and-forget open -a Vivaldi'
alt-shift-v      = 'exec-and-forget open -a "Visual Studio Code"'
alt-shift-g      = 'exec-and-forget open -a Ferdium'
alt-shift-m      = 'exec-and-forget open -a Spotify'
alt-shift-f      = 'exec-and-forget open -a Figma'
alt-shift-o      = 'exec-and-forget open -a Obsidian'
alt-shift-c      = 'exec-and-forget open -a Calendar'
alt-shift-e      = 'exec-and-forget open "raycast://extensions/raycast/emoji-symbols/search-emoji-symbols"'


# --- Service mode entry ----------------------------------------------------
# Service mode holds the less-common operations (reset layout, close-all-but,
# join containers, etc.). Press `alt-shift-;` to enter, then a single key.
alt-shift-semicolon = 'mode service'


# ===========================================================================
# Service mode — like a leader key for window-manager admin commands.
# Enter with `alt-shift-;`, then press one of the keys below.
# ===========================================================================
[mode.service.binding]
esc       = ['reload-config', 'mode main']
r         = ['flatten-workspace-tree', 'mode main']     # reset / "balance" (≈ yabai `alt - 0`)
f         = ['layout floating tiling', 'mode main']     # toggle float
backspace = ['close-all-windows-but-current', 'mode main']
enter     = ['fullscreen', 'mode main']

# Join focused window with neighbor — useful for grouping in accordion mode.
alt-shift-h = ['join-with left',  'mode main']
alt-shift-j = ['join-with down',  'mode main']
alt-shift-k = ['join-with up',    'mode main']
alt-shift-l = ['join-with right', 'mode main']


# ===========================================================================
# Workspace ↔ monitor pinning (kept from existing config).
# Forces a workspace to always live on a specific monitor. Handy with sketchybar
# so each monitor has predictable workspaces.
# ===========================================================================
# Pin each workspace to a specific physical monitor.
# Monitor names come from `aerospace list-monitors`. Patterns are tried in
# order; first match wins, with `secondary` (any non-main monitor) as a
# fallback so workspaces 3-6 don't get stranded on laptop-only days — they'll
# pile up on `main` if nothing else is connected.
#
# Layout: 2 workspaces per monitor.
#   laptop / main         → 1, 2
#   external #1 (LF27T35) → 3, 4
#   external #2 (LF27T35) → 5, 6
[workspace-to-monitor-force-assignment]
1 = ['main']
2 = ['main']
3 = ['LF27T35 (2)', 'secondary']
4 = ['LF27T35 (2)', 'secondary']
5 = ['LF27T35 (1)', 'secondary']
6 = ['LF27T35 (1)', 'secondary']


# =============================================================================
# THINGS THAT DON'T TRANSLATE — quick reference
# =============================================================================
#
# yabai feature                      | Aerospace status
# -----------------------------------+----------------------------------------
# `sub-layer = above` (always-on-top)| Not supported. Use Hammerspoon/AfloatX.
# `sticky = on`                      | Not supported (upstream issue #2).
# `space --create / --destroy`       | Workspaces are fixed at config time.
# `space --rotate 270`               | No equivalent.
# `space --mirror x-axis / y-axis`   | No equivalent.
# `window --toggle zoom-parent`      | No equivalent (only fullscreen).
# `mouse_modifier = alt` + drag      | Not supported.
# `focus_follows_mouse autoraise`    | Not supported.
# `window_opacity` / fades           | Not supported.
# `external_bar all:38:0`            | Use `[gaps]` `outer.top` instead.
# `signal --add event=...`           | No native event hooks; use `exec-and-forget`
#                                      from after-startup-command, or run a
#                                      sidecar script that reacts to
#                                      `aerospace list-workspaces` output.
#
# =============================================================================
# WORKFLOW SUGGESTIONS — things to consider once you're up and running
# =============================================================================
#
# 1. Lean into named workspaces. Instead of `1..6`, use `W` (web), `C` (code),
#    `T` (term), `M` (messaging), `D` (design), `N` (notes). Combined with the
#    `[[on-window-detected]]` auto-assignment block above, your apps always
#    land where you expect.
#
# 2. Use sketchybar's aerospace plugin to display the current workspace per
#    monitor — much more useful than yabai's space indicators since
#    workspaces are stable.
#
# 3. Replace skhd entirely. Aerospace's keybind system covers everything skhd
#    did for you; once you cut over you can stop the skhd service. (Karabiner
#    is still useful if you have non-WM rebinds.)
#
# 4. For the always-on-top need (Claude pinning), the cleanest pairing is
#    Hammerspoon — small Lua script using `hs.window:setLevel()`. AfloatX is
#    the no-config alternative.
#
# 5. Aerospace has no daemon-restart/SA-load complexity. If something breaks,
#    `aerospace reload-config` or quitting the app is the entire recovery
#    procedure. No more `sudo yabai --load-sa` after every macOS update.
#
# =============================================================================
