gui:
  branchColorPatterns:
    '^conflicts/': '#ed8796'
    '^hotfix/': '#ee99a0'
    '^feature/': '#7dc4e4'
    '^bugfix/': '#eed49f'
    '^chore/': '#8aadf4'
    '^release/': '#a6da95'
    '^adhoc/': '#f5bde6'
  theme:
    activeBorderColor:
      - '#f5a97f'
      - bold
    inactiveBorderColor:
      - '#a5adcb'
    optionsTextColor:
      - '#8aadf4'
    selectedLineBgColor:
      - '#363a4f'
    cherryPickedCommitBgColor:
      - '#494d64'
    cherryPickedCommitFgColor:
      - '#f5a97f'
    unstagedChangesColor:
      - '#ed8796'
    defaultFgColor:
      - '#cad3f5'
    searchingActiveBorderColor:
      - '#eed49f'
  authorColors:
    '*': '#b7bdf8'
  # showFileTree: false
  switchTabsWithPanelJumpKeys: true
git:
  autoForwardBranches: none
  pagers:
    - pager: delta --paging=never
      colorArg: always
    - pager: delta --paging=never --line-numbers
      colorArg: always
    - pager: delta --paging=never --side-by-side
      colorArg: always
    - pager: diff-so-fancy
customCommands:
  - key: o
    context: 'files'
    description: 'Open file in neovim (tmux popup, else current terminal)'
    command: "~/.config/lazygit/scripts/edit.sh {{.SelectedFile.Name}}"
    output: terminal
  - key: o
    context: 'commitFiles'
    description: "Open file's commit diff in neovim (before/after, side-by-side)"
    command: "~/.config/lazygit/scripts/diff-commit.sh {{.SelectedLocalCommit.Hash}} {{.SelectedCommitFile.Name}}"
    output: terminal
  - key: o
    context: 'localBranches'
    command: 'gh pr view --web {{.SelectedLocalBranch.Name }}'
    description: 'Open PR for selected branch (web)'
    loadingText: "Opening pr in browser..."
  - key: O
    command: "gh pr create --fill --web --base {{.Form.Branch}} --label {{.Form.Label}}"
    context: 'localBranches'
    description: "Create pull request on Github (web)"
    loadingText: "Creating pull reques on Github..."
    prompts:
      - type: "input"
        title: "Choose BASE branch"
        key: "Branch"
        suggestions:
          preset: 'branches'
      - type: 'input'
        title: 'Choose label'
        key: 'Label'
        initialValue: "feature"
        suggestions:
          command: "gh label list --json name --jq '.[].name'"
  - key: <c-g>
    description: "Github pull requests"
    commandMenu:
      - key: n
        command: "gh pr create --fill --web --base {{.Form.Branch}} --label {{.Form.Label}}"
        context: "global"
        description: "Create pull request on Github (web)"
        loadingText: "Creating pull reques on Github..."
        prompts:
          - type: "input"
            title: "Choose BASE branch"
            key: "Branch"
            suggestions:
              preset: 'branches'
          - type: 'input'
            title: 'Choose label'
            key: 'Label'
            initialValue: "feature"
            suggestions:
              command: "gh label list --json name --jq '.[].name'"
      - key: o
        context: 'localBranches'
        command: 'gh pr view --web {{.SelectedLocalBranch.Name }}'
        description: 'Open PR for selected branch (web)'
      - key: l
        command: "gh dash"
        context: "global"
        output: "terminal"
        description: "View pull requests (gh-dash)"
  - key: X
    description: "Various commands"
    commandMenu:
      - key: p
        command: "git fetch -p"
        context: "global"
        description: "Fetch (and prune)"
        loadingText: "Fetching"
        prompts:
          - type: "confirm"
            title: "Fetch and Prune?"
            body: "Are you sure?"
      - key: m
        command: "git merge-tree --write-tree HEAD {{.SelectedLocalBranch.Name}} > /dev/null 2>&1 && echo '✅ Clean merge possible' || echo '❌ Conflicts detected'"
        context: "localBranches"
        description: "Dry-run merge check"
        output: popup
keybinding:
  files:
    toggleTreeView: "'"
